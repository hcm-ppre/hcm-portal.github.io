<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPRE JP Portal</title>

    <link rel="icon" href="https://absensi.pp-presisi.co.id/logo.png" type="image/png">

    <style>
        /* Menghapus jarak bawaan browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        /* Mengatur iframe fullscreen */
        .iframe-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 1; /* Posisi dasar */
        }

        /* 2. KODE CSS FLOATING NAVICON: Mengatur posisi tombol navigasi melayang */
        .floating-navicon {
            position: fixed;
            top: 15px;      /* Jarak dari atas layar */
            right: 15px;    /* Jarak dari kanan layar (ubah ke 'left' jika ingin di kiri) */
            z-index: 999;   /* Memastikan ikon berada di atas iframe */
            background-color: white; /* Latar belakang opsional */
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mengatur ukuran gambar/ikon di dalam navicon */
        .floating-navicon img {
            width: 25px;
            height: 25px;
        }
    </style>
</head>
<body>

    <a href="https://url-tujuan-anda.com" class="floating-navicon" title="Kembali ke Beranda">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Menu">
    </a>

    <iframe class="iframe-fullscreen" src="https://script.google.com/macros/s/AKfycby1grSc8o6_FLdGKcxVdNyBx8-pHXfpc4mDkd5rUVVJriZ9Wb5zuS2gQvjv_rHipfCs/exec"></iframe>

</body>
</html>
