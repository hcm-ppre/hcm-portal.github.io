<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPRE Talent Portal</title>
    
    <link rel="icon" href="https://absensi.pp-presisi.co.id/logo.png" type="image/png">

    <style>
        /* Reset jarak dan mengatur tinggi responsif dinamis */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; /* Fallback untuk browser lama */
            height: 100dvh; /* Mencegah terpotong oleh address bar di HP */
            overflow: hidden; 
            background-color: #ffffff; /* Menghindari flash putih/hitam */
        }

        /* Memastikan iframe benar-benar penuh */
        .iframe-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Menghilangkan spasi aneh di bagian bawah iframe */
        }

        /* Navicon */
        .floating-navicon {
            position: fixed;
            top: 15px;      
            right: 15px;    
            z-index: 999;   
            background-color: white; 
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-navicon img {
            width: 25px;
            height: 25px;
        }
    </style>
</head>
<body>

    <a href="https://hcm-ppre.github.io/hcm-portal/" class="floating-navicon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Menu">
    </a>

    <iframe class="iframe-fullscreen" src="https://script.google.com/macros/s/AKfycby1grSc8o6_FLdGKcxVdNyBx8-pHXfpc4mDkd5rUVVJriZ9Wb5zuS2gQvjv_rHipfCs/exec"></iframe>

</body>
</html>
